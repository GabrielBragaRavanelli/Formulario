<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Formulário</title>
</head>
<body>
    <div class ="container">
        <div class=" form-image">
            <img src="img/undraw_complete-form_aarh.svg">
        </div>
        <div class="form">
            <form action="#">
                <div class="form-header">
                    <div class="title">
                        <h1>Cadastre-se</h1>
                    </div>
                    <div class="login-button">
                        <button><a href="#"></a>Entrar</button>
                    </div>
             </div>
             <div class="input-group">

                <div class="input-box">
                    <label for="firstname">Primeiro nome</label>
                    <input id="firstname" type="text" name="firstname" placeholder="Digite seu primeiro nome" required>
                </div>

                <div class="input-box">
                    <label for="lastname">Sobrenome</label>
                    <input id="lastname" type="text" name="lastname" placeholder="Digite seu Sobrenome" required>
                </div>

                <div class="input-box">
                    <label for="Email">E-mail</label>
                    <input id="Email" type="text" name="Email" placeholder="Digite seu Email" required>
                </div>

                <div class="input-box">
                    <label for="number">Celular</label>
                    <input id="number" type="Tel" name="number" placeholder="(xx)xxxxx-xxxx" required>
                </div>

                <div class="input-box">
                    <label for="password">Criar uma senha</label>
                    <input id="password" type="password" name="password" placeholder="Digite sua senha" required>
                </div>

                <div class="input-box">
                    <label for="Confirmpassword">Confirme a senha</label>
                    <input id="Confirmpassword" type="password" name="Confirmpassword" placeholder="Digite a senha novamente" required>
                </div>
             </div>
             <div class="gender-inputs">
                <div class="gender-title">
                    <h6>Gênero</h6>
                </div>

                <div class="gender-group">  
                    <div class="gender-input">
                        <input type="radio"  id="female" name="gender">
                        <label for="female">Feminino</label>
                    </div>

                      <div class="gender-input">
                        <input type="radio"  id="male" name="gender">
                        <label for="male">Masculino</label>
                    </div>

                      <div class="gender-input">
                        <input type="radio"  id="others" name="gender">
                        <label for="others">Outros</label>
                    </div>

                      <div class="gender-input">
                        <input type="radio"  id="none" name="gender">
                        <label for="none">Não gostaria de especificar</label>
                    </div>
                </div>
             </div>
            <div class="botão-continuar">
                <button><a href="#">Continuar</a></button>
            </div>
          </form>
      </div>
  </div>
</body>
</html>
